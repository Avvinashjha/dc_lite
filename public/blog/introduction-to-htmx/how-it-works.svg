<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none" aria-hidden="true">
  <title>HTMX request flow</title>
  <rect x="20" y="25" width="70" height="50" rx="6" fill="#1a365d" stroke="#2c5282"/>
  <text x="55" y="52" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10">User click</text>
  <text x="55" y="65" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="8">hx-get</text>
  <path stroke="#4a5568" stroke-width="2" d="M90 50h35" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0l8 4-8 4V0z" fill="#4a5568"/></marker></defs>
  <rect x="125" y="25" width="70" height="50" rx="6" fill="#2c5282" stroke="#2b6cb0"/>
  <text x="160" y="52" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10">AJAX</text>
  <text x="160" y="65" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="8">request</text>
  <path stroke="#4a5568" stroke-width="2" d="M195 50h35" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0l8 4-8 4V0z" fill="#4a5568"/></marker></defs>
  <rect x="230" y="25" width="70" height="50" rx="6" fill="#2f855a" stroke="#276749"/>
  <text x="265" y="52" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10">Server</text>
  <text x="265" y="65" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="8">HTML</text>
  <path stroke="#4a5568" stroke-width="2" d="M300 50h35" marker-end="url(#arr3)"/>
  <defs><marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0l8 4-8 4V0z" fill="#4a5568"/></marker></defs>
  <rect x="335" y="25" width="50" height="50" rx="6" fill="#2c5282" stroke="#2b6cb0"/>
  <text x="360" y="55" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="9">hx-swap</text>
  <text x="360" y="68" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="8">DOM</text>
  <text x="200" y="92" text-anchor="middle" fill="#718096" font-family="system-ui,sans-serif" font-size="10">No JSON, no client state - just HTML</text>
</svg>
