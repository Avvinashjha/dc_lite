<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ccl-bg" x1="0" y1="0" x2="640" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="55%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="ccl-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" rx="12" fill="url(#ccl-bg)"/>
  <!-- Decorative grid -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="90" x2="640" y2="90"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="270" x2="640" y2="270"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
  </g>
  <!-- Copy: left column -->
  <text x="48" y="98" fill="#fef3c7" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="700">Claude Code leak</text>
  <text x="48" y="132" fill="rgba(255,255,255,0.82)" font-family="system-ui,Segoe UI,sans-serif" font-size="15">npm package shipped a source map by mistake</text>
  <text x="48" y="158" fill="rgba(255,255,255,0.55)" font-family="system-ui,Segoe UI,sans-serif" font-size="13">Impact, takedowns, forks, clean-room rewrites</text>
  <!-- Illustration: npm box + map file -->
  <g transform="translate(400, 64)">
    <rect x="0" y="0" width="168" height="118" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
    <path d="M44 28h80v14H44z" fill="url(#ccl-accent)" opacity="0.9"/>
    <text x="84" y="40" text-anchor="middle" fill="#1c1917" font-family="ui-monospace,Courier New,monospace" font-size="11" font-weight="700">npm</text>
    <text x="84" y="72" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="ui-monospace,Courier New,monospace" font-size="13" font-weight="600">cli.js.map</text>
    <text x="84" y="94" text-anchor="middle" fill="rgba(251,191,36,0.95)" font-family="ui-monospace,Courier New,monospace" font-size="11">TypeScript recovered</text>
    <circle cx="132" cy="22" r="16" fill="rgba(220,38,38,0.25)" stroke="#f87171" stroke-width="1.5"/>
    <text x="132" y="27" text-anchor="middle" fill="#fecaca" font-family="system-ui,sans-serif" font-size="14" font-weight="700">!</text>
  </g>
  <!-- Flow: arrow -->
  <path d="M332 200 L372 200" stroke="rgba(251,191,36,0.5)" stroke-width="2" stroke-linecap="round"/>
  <path d="M366 194 L374 200 L366 206" fill="none" stroke="rgba(251,191,36,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom strip -->
  <rect x="48" y="268" width="544" height="40" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.1)"/>
  <text x="320" y="293" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="ui-monospace,Courier New,monospace" font-size="12">v2.1.88 | packaging error | not a customer credential breach</text>
</svg>
